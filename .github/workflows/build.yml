name: Build Electron App

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm' # Speeds up future runs

      - name: Install dependencies
        # 'npm ci' is preferred for CI/CD as it's faster and stricter than 'install'
        run: npm ci 

      - name: Build macOS app
        run: npm run dist:mac
        env:
          # This disables code signing for now so you can see if the build actually works
          CSC_IDENTITY_AUTO_DISCOVERY: false 

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: release/
