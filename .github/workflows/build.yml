name: Build Electron App
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Set version
        run: npm version --no-git-tag-version 0.0.${{ github.run_number }}
      - name: Clean and Build
        run: |
          rm -rf dist
          npm run build
          npm run dist:mac
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: DICOM-Viewer-mac
          path: release/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Set version
        run: npm version --no-git-tag-version 0.0.${{ github.run_number }}
      - name: Clean and Build
        run: |
          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          npm run build
          npm run dist:win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload EXE Installer
        uses: actions/upload-artifact@v4
        with:
          name: DICOM-Viewer-windows-installer
          path: release/*Setup*.exe
      - name: Upload EXE Portable
        uses: actions/upload-artifact@v4
        with:
          name: DICOM-Viewer-windows-portable
          path: release/*Portable*.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.0.${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: |
            Automated build from commit ${{ github.sha }}
          files: |
            artifacts/DICOM-Viewer-mac/*.dmg
            artifacts/DICOM-Viewer-windows-installer/*.exe
            artifacts/DICOM-Viewer-windows-portable/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
