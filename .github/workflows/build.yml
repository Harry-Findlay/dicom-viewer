name: Build Electron App
on:
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Clean and Build
        run: |
          rm -rf dist
          npm run build
          npm run dist:mac
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: DICOM-Viewer-mac
          path: release/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Clean and Build
        run: |
          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          npm run build
          npm run dist:win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: DICOM-Viewer-windows
          path: release/*.exe
